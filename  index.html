body{display: none;}
.notice-mask{

select{

    padding:12px;
    border-radius:6px;
    margin:8px 0;

button{
    width:100%;
    background:#2578dd;
    color:white;
    border:none;
    padding:14px;
    border-radius:6px;
    font-size:15px;
    margin-top:8px
}
.tip-box{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#fff;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px #ccc;
    color:red;
    font-size:16px;
    z-index:9999;
    max-width:85%;
}
.success-tip{
    color:#009944;
}
audio {display: none;}
.myimg{
    width:75%;

    display:block;
    margin:25px auto 0 auto;
